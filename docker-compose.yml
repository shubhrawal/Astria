services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  llm-service:
    build:
      context: ./llm-service
    ports:
      - "8000:8000"
    env_file:
      - ./llm-service/.env
